<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📻 WHOPPER RADIO • РАЦИЯ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, sans-serif;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* ===== ВЕРХНЯЯ ЧАСТЬ ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .logo {
            font-size: 1.8rem;
            color: #f5a623;
        }

        .logo span {
            font-size: 1rem;
            font-weight: bold;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.offline {
            background: #444;
        }
        .status-dot.online {
            background: #4CAF50;
            animation: pulse-dot 1.5s infinite;
        }
        .status-dot.transmitting {
            background: #ff4444;
            animation: pulse-dot 0.4s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ===== КАНАЛ ===== */
        .channel-display {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .channel-label {
            font-size: 0.8rem;
            color: #888;
        }

        .channel-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f5a623;
            font-family: 'Courier New', monospace;
        }

        .channel-controls {
            display: flex;
            gap: 10px;
        }

        .channel-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .channel-btn:active {
            transform: scale(0.9);
            background: rgba(245,166,35,0.3);
        }

        /* ===== КНОПКА PTT (Главная) ===== */
        .ptt-container {
            position: relative;
            margin: 20px auto 25px;
        }

        .ptt-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px solid #444;
            background: radial-gradient(circle at 30% 30%, #2d2d44, #1a1a2e);
            color: #888;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            position: relative;
            touch-action: none;
        }

        .ptt-btn .icon {
            font-size: 3.5rem;
            transition: 0.2s;
        }

        .ptt-btn .label {
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ptt-btn .sub-label {
            font-size: 0.6rem;
            color: #666;
            font-weight: normal;
        }

        .ptt-btn:active {
            transform: scale(0.95);
        }

        /* Состояние: Нажата (передача) */
        .ptt-btn.transmitting {
            border-color: #ff4444;
            background: radial-gradient(circle at 30% 30%, #ff4444, #cc0000);
            color: white;
            animation: transmit-pulse 0.8s infinite;
        }

        @keyframes transmit-pulse {
            0% { box-shadow: 0 0 20px rgba(255,68,68,0.2); }
            50% { box-shadow: 0 0 60px rgba(255,68,68,0.5); }
            100% { box-shadow: 0 0 20px rgba(255,68,68,0.2); }
        }

        .ptt-btn.transmitting .icon {
            animation: mic-pulse 0.5s infinite;
        }

        @keyframes mic-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Волны вокруг кнопки при передаче */
        .ptt-btn .waves-ring {
            display: none;
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border-radius: 50%;
            border: 2px solid rgba(255,68,68,0.15);
            animation: wave-ring 1.2s infinite;
        }

        .ptt-btn.transmitting .waves-ring {
            display: block;
        }

        .ptt-btn .waves-ring:nth-child(2) {
            animation-delay: 0.4s;
        }
        .ptt-btn .waves-ring:nth-child(3) {
            animation-delay: 0.8s;
        }

        @keyframes wave-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* ===== ИНФО ПАНЕЛЬ ===== */
        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .info-item {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
        }

        .info-item .value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #f5a623;
        }

        .info-item .label {
            font-size: 0.6rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ===== ПОСЛЕДНИЕ СООБЩЕНИЯ ===== */
        .messages-title {
            text-align: left;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .messages-list {
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 10px;
        }

        .messages-list::-webkit-scrollbar {
            width: 3px;
        }
        .messages-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.03);
            border-radius: 4px;
        }
        .messages-list::-webkit-scrollbar-thumb {
            background: #f5a623;
            border-radius: 4px;
        }

        .msg-item {
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .msg-item .msg-user {
            color: #f5a623;
            font-weight: bold;
            font-size: 0.75rem;
            min-width: 60px;
        }

        .msg-item .msg-time {
            color: #555;
            font-size: 0.65rem;
            min-width: 40px;
        }

        .msg-item .msg-play {
            background: none;
            border: none;
            color: #4CAF50;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 2px 8px;
        }

        .msg-item .msg-play:active {
            transform: scale(0.9);
        }

        .msg-empty {
            text-align: center;
            color: #444;
            padding: 20px;
            font-size: 0.85rem;
        }

        /* ===== ТОСТ ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 100;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            font-weight: 600;
            font-size: 0.85rem;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #ff4444; }
        .toast.info { background: #2196F3; }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 500px) {
            .ptt-btn {
                width: 180px;
                height: 180px;
            }
            .ptt-btn .icon {
                font-size: 2.8rem;
            }
            .header .logo {
                font-size: 1.4rem;
            }
            .info-panel {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }
            .info-item .value {
                font-size: 1rem;
            }
            .channel-number {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 400px) {
            .ptt-btn {
                width: 150px;
                height: 150px;
            }
            .ptt-btn .icon {
                font-size: 2.2rem;
            }
            .ptt-btn .label {
                font-size: 0.7rem;
            }
        }

        /* ===== АНИМАЦИЯ ДЛЯ НОВЫХ СООБЩЕНИЙ ===== */
        .msg-item.new {
            background: rgba(245,166,35,0.15);
            border-left: 3px solid #f5a623;
        }

        /* Отключение прокрутки страницы при удержании кнопки */
        .no-scroll {
            overflow: hidden;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container">
        <!-- ШАПКА -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-radio"></i>
                <span>РАЦИЯ</span>
            </div>
            <div class="status-badge">
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">Офлайн</span>
            </div>
        </div>

        <!-- КАНАЛ -->
        <div class="channel-display">
            <div>
                <div class="channel-label">КАНАЛ</div>
                <div class="channel-number" id="channelNumber">1</div>
            </div>
            <div class="channel-controls">
                <button class="channel-btn" onclick="changeChannel(-1)"><i class="fas fa-minus"></i></button>
                <button class="channel-btn" onclick="changeChannel(1)"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <!-- КНОПКА PTT -->
        <div class="ptt-container">
            <button class="ptt-btn idle" id="pttBtn"
                    onmousedown="startTransmit()"
                    onmouseup="stopTransmit()"
                    onmouseleave="stopTransmit()"
                    ontouchstart="startTransmit()"
                    ontouchend="stopTransmit()"
                    ontouchcancel="stopTransmit()">
                <span class="waves-ring"></span>
                <span class="waves-ring"></span>
                <span class="waves-ring"></span>
                <span class="icon"><i class="fas fa-microphone-alt"></i></span>
                <span class="label" id="pttLabel">НАЖМИТЕ</span>
                <span class="sub-label">Удерживайте для передачи</span>
            </button>
        </div>

        <!-- ИНФО -->
        <div class="info-panel">
            <div class="info-item">
                <div class="value" id="listenerCount">0</div>
                <div class="label">Слушают</div>
            </div>
            <div class="info-item">
                <div class="value" id="signalStrength">📶</div>
                <div class="label">Сигнал</div>
            </div>
            <div class="info-item">
                <div class="value" id="lastMsgTime">--:--</div>
                <div class="label">Последний</div>
            </div>
        </div>

        <!-- СООБЩЕНИЯ -->
        <div class="messages-title">
            <i class="fas fa-history"></i> История сообщений
        </div>
        <div class="messages-list" id="messagesList">
            <div class="msg-empty">
                <i class="fas fa-radio" style="display:block; font-size:1.5rem; margin-bottom:8px; color:#333;"></i>
                Нет сообщений в эфире
            </div>
        </div>
    </div>

    <script>
        // ========== FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
            authDomain: "bk-cashier.firebaseapp.com",
            databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bk-cashier",
            storageBucket: "bk-cashier.firebasestorage.app",
            messagingSenderId: "385000840969",
            appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== ПЕРЕМЕННЫЕ ==========
        const userId = 'user_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 4);
        let channel = 1;
        let isTransmitting = false;
        let isMicReady = false;
        let stream = null;
        let peerConnection = null;
        let audioSender = null;
        let liveListenerRef = null;
        let isReceiving = false;

        // ========== ПОКАЗАТЬ ТОСТ ==========
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
        }

        // ========== СТАТУС ==========
        function setStatus(state, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            dot.className = 'status-dot ' + state;
            statusText.textContent = text;
        }

        // ========== ЗАПРОС МИКРОФОНА ==========
        async function requestMicrophone() {
            try {
                showToast('🎤 Запрос доступа к микрофону...', 'info');

                stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                isMicReady = true;
                showToast('✅ Микрофон готов', 'success');
                return true;

            } catch (err) {
                console.error('Ошибка доступа к микрофону:', err);

                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    showToast('❌ Разрешите доступ к микрофону в браузере', 'error');
                } else if (err.name === 'NotFoundError') {
                    showToast('❌ Микрофон не найден', 'error');
                } else {
                    showToast('❌ Ошибка: ' + err.message, 'error');
                }

                return false;
            }
        }

        // ========== НАЧАТЬ ПЕРЕДАЧУ (PTT) ==========
        window.startTransmit = async function() {
            if (isTransmitting) return;

            if (!isMicReady) {
                const ok = await requestMicrophone();
                if (!ok) return;
            }

            // Запускаем трансляцию
            isTransmitting = true;

            // Обновляем кнопку
            const btn = document.getElementById('pttBtn');
            btn.className = 'ptt-btn transmitting';
            document.getElementById('pttLabel').textContent = 'ГОВОРИТЕ';
            document.querySelector('.ptt-btn .sub-label').textContent = '🔴 В эфире...';

            setStatus('transmitting', 'Передача');

            // Запускаем WebRTC трансляцию
            startBroadcasting();

            // Вибрация (если есть)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }

            showToast('🔴 Передача начата', 'info');
        };

        // ========== ОСТАНОВИТЬ ПЕРЕДАЧУ ==========
        window.stopTransmit = function() {
            if (!isTransmitting) return;

            isTransmitting = false;

            // Обновляем кнопку
            const btn = document.getElementById('pttBtn');
            btn.className = 'ptt-btn idle';
            document.getElementById('pttLabel').textContent = 'НАЖМИТЕ';
            document.querySelector('.ptt-btn .sub-label').textContent = 'Удерживайте для передачи';

            setStatus('online', 'Онлайн');

            // Останавливаем трансляцию
            stopBroadcasting();

            if (navigator.vibrate) {
                navigator.vibrate(30);
            }

            showToast('⏹️ Передача завершена', 'info');
        };

        // ========== НАЧАТЬ ТРАНСЛЯЦИЮ (WebRTC) ==========
        function startBroadcasting() {
            try {
                if (!stream) {
                    showToast('❌ Микрофон не готов', 'error');
                    return;
                }

                // Создаём WebRTC
                const configuration = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                };

                peerConnection = new RTCPeerConnection(configuration);

                // Добавляем аудио
                const audioTrack = stream.getAudioTracks()[0];
                if (audioTrack) {
                    audioSender = peerConnection.addTrack(audioTrack, stream);
                }

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        db.ref('radio/channels/' + channel + '/broadcasters/' + userId + '/candidate').set({
                            candidate: event.candidate,
                            timestamp: Date.now()
                        });
                    }
                };

                // Создаём offer
                peerConnection.createOffer()
                    .then(offer => peerConnection.setLocalDescription(offer))
                    .then(() => {
                        db.ref('radio/channels/' + channel + '/broadcasters/' + userId).set({
                            type: 'offer',
                            sdp: peerConnection.localDescription,
                            timestamp: Date.now(),
                            active: true
                        });
                        db.ref('radio/channels/' + channel + '/broadcasters/' + userId).onDisconnect().remove();

                        // Отмечаем что вещаем
                        db.ref('radio/channels/' + channel + '/active').set({
                            userId: userId,
                            startedAt: Date.now()
                        });
                    })
                    .catch(err => {
                        console.error('Ошибка offer:', err);
                        showToast('❌ Ошибка трансляции', 'error');
                        stopTransmit();
                    });

                // Слушаем ответы
                db.ref('radio/channels/' + channel + '/broadcasters/' + userId + '/answers').on('value', (sn) => {
                    const data = sn.val();
                    if (data && data.sdp && peerConnection) {
                        peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp))
                            .catch(err => console.error('Ошибка answer:', err));
                    }
                });

                // Слушаем кандидаты
                db.ref('radio/channels/' + channel + '/broadcasters/' + userId + '/candidate').on('child_added', (sn) => {
                    const data = sn.val();
                    if (data && data.candidate && peerConnection) {
                        peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate))
                            .catch(err => console.error('Ошибка кандидата:', err));
                    }
                });

            } catch (err) {
                console.error('Ошибка вещания:', err);
                showToast('❌ Ошибка: ' + err.message, 'error');
                stopTransmit();
            }
        }

        // ========== ОСТАНОВИТЬ ТРАНСЛЯЦИЮ ==========
        function stopBroadcasting() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
                audioSender = null;
            }

            db.ref('radio/channels/' + channel + '/broadcasters/' + userId).remove();
            db.ref('radio/channels/' + channel + '/active').remove();
        }

        // ========== ПРИЁМ ЭФИРА ==========
        function startReceiving(broadcasterId) {
            if (isReceiving) return;

            try {
                const configuration = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                };

                const pc = new RTCPeerConnection(configuration);

                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        db.ref('radio/channels/' + channel + '/broadcasters/' + broadcasterId + '/candidate').set({
                            candidate: event.candidate,
                            timestamp: Date.now()
                        });
                    }
                };

                pc.ontrack = (event) => {
                    if (event.track.kind === 'audio') {
                        const audio = new Audio();
                        audio.srcObject = new MediaStream([event.track]);
                        audio.play().catch(() => {});
                        isReceiving = true;
                        // Показываем что приняли сигнал
                        document.getElementById('signalStrength').textContent = '📶📶📶';
                    }
                };

                // Получаем offer
                db.ref('radio/channels/' + channel + '/broadcasters/' + broadcasterId).on('value', (sn) => {
                    const data = sn.val();
                    if (data && data.type === 'offer' && data.sdp) {
                        pc.setRemoteDescription(new RTCSessionDescription(data.sdp))
                            .then(() => pc.createAnswer())
                            .then(answer => pc.setLocalDescription(answer))
                            .then(() => {
                                db.ref('radio/channels/' + channel + '/broadcasters/' + broadcasterId + '/answers').set({
                                    sdp: pc.localDescription,
                                    timestamp: Date.now()
                                });
                            })
                            .catch(err => console.error('Ошибка ответа:', err));
                    }
                });

                db.ref('radio/channels/' + channel + '/broadcasters/' + broadcasterId + '/candidate').on('child_added', (sn) => {
                    const data = sn.val();
                    if (data && data.candidate) {
                        pc.addIceCandidate(new RTCIceCandidate(data.candidate))
                            .catch(err => console.error('Ошибка кандидата:', err));
                    }
                });

                window._receiverPC = pc;
                window._receiverBroadcaster = broadcasterId;

            } catch (err) {
                console.error('Ошибка подключения:', err);
            }
        }

        // ========== СЛЕЖЕНИЕ ЗА КАНАЛОМ ==========
        function watchChannel() {
            db.ref('radio/channels/' + channel + '/active').on('value', (sn) => {
                const active = sn.val();

                // Очищаем старые соединения
                if (window._receiverPC) {
                    window._receiverPC.close();
                    window._receiverPC = null;
                    isReceiving = false;
                    document.getElementById('signalStrength').textContent = '📶';
                }

                // Если есть активный вещатель
                if (active && active.userId && active.userId !== userId) {
                    startReceiving(active.userId);
                }
            });
        }

        // ========== СМЕНА КАНАЛА ==========
        window.changeChannel = function(delta) {
            channel = Math.max(1, Math.min(20, channel + delta));
            document.getElementById('channelNumber').textContent = channel;

            // Переподключаемся к каналу
            if (window._receiverPC) {
                window._receiverPC.close();
                window._receiverPC = null;
                isReceiving = false;
                document.getElementById('signalStrength').textContent = '📶';
            }

            // Если мы ведём трансляцию — останавливаем
            if (isTransmitting) {
                stopTransmit();
            }

            watchChannel();
            showToast('📻 Канал ' + channel, 'info');
        };

        // ========== СЧЁТЧИК СЛУШАТЕЛЕЙ ==========
        function updateListeners() {
            if (liveListenerRef) {
                liveListenerRef.remove();
            }

            const ref = db.ref('radio/listeners/' + userId);
            ref.set({
                online: true,
                lastSeen: Date.now(),
                channel: channel,
                isBroadcaster: false
            });
            ref.onDisconnect().remove();
            liveListenerRef = ref;

            db.ref('radio/listeners').on('value', (sn) => {
                const count = sn.numChildren();
                document.getElementById('listenerCount').textContent = count;
            });
        }

        // ========== ЗАГРУЗКА ИСТОРИИ ==========
        function loadHistory() {
            db.ref('radio/messages').orderByChild('timestamp').limitToLast(20).on('value', (sn) => {
                const items = [];
                sn.forEach(child => items.push({ id: child.key, ...child.val() }));
                renderMessages(items.reverse());
            });
        }

        function renderMessages(items) {
            const container = document.getElementById('messagesList');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="msg-empty">
                        <i class="fas fa-radio" style="display:block; font-size:1.5rem; margin-bottom:8px; color:#333;"></i>
                        Нет сообщений в эфире
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(msg => `
                <div class="msg-item">
                    <span class="msg-user"><i class="fas fa-user"></i> ${msg.userName || 'Кто-то'}</span>
                    <span class="msg-time">${formatTime(msg.timestamp)}</span>
                    <button class="msg-play" onclick="playMessage('${msg.id}')">
                        <i class="fas fa-play"></i>
                    </button>
                </div>
            `).join('');

            // Обновляем время последнего сообщения
            if (items.length > 0) {
                document.getElementById('lastMsgTime').textContent = formatTime(items[0].timestamp);
            }
        }

        function formatTime(ts) {
            if (!ts) return '--:--';
            const d = new Date(ts);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // ========== ВОСПРОИЗВЕДЕНИЕ СООБЩЕНИЯ ==========
        window.playMessage = (msgId) => {
            showToast('📻 Сохранённые записи в разработке', 'info');
        };

        // ========== ПРИ ЗАКРЫТИИ ==========
        window.addEventListener('beforeunload', () => {
            if (isTransmitting) {
                stopBroadcasting();
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            if (liveListenerRef) {
                liveListenerRef.remove();
            }
            if (window._receiverPC) {
                window._receiverPC.close();
            }
            db.ref('radio/channels/' + channel + '/broadcasters/' + userId).remove();
            db.ref('radio/channels/' + channel + '/active').remove();
            db.ref('radio/listeners/' + userId).remove();
        });

        // ========== ЗАПУСК ==========
        setStatus('online', 'Онлайн');
        updateListeners();
        loadHistory();
        watchChannel();

        // Проверка поддержки
        console.log('📻 WHOPPER РАЦИЯ');
        console.log('🆔 ID:', userId);
        console.log('📡 Канал:', channel);
        console.log('🔴 Нажмите и удерживайте кнопку для передачи');
        console.log('🎤 Работает как настоящая рация!');
    </script>
</body>
</html>
