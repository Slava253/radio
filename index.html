<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📻 РАЦИЯ • WHOPPER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: white;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            color: #f5a623;
            margin-bottom: 5px;
        }

        .logo span {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
            color: white;
        }

        .sub {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        /* СТАТУС */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 10px 16px;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.gray { background: #555; }
        .status-dot.green { background: #4CAF50; animation: pulse-dot 1.5s infinite; }
        .status-dot.red { background: #ff4444; animation: pulse-dot 0.5s infinite; }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        .status-text {
            font-size: 0.85rem;
            color: #aaa;
        }

        .listeners-count {
            font-size: 0.85rem;
            color: #888;
        }

        .listeners-count span {
            color: #f5a623;
            font-weight: bold;
        }

        /* КНОПКА PTT */
        .ptt-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #444;
            background: radial-gradient(circle at 30% 30%, #2d2d44, #1a1a2e);
            color: #888;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 10px auto 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .ptt-btn .icon {
            font-size: 3.5rem;
        }

        .ptt-btn .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ptt-btn:active {
            transform: scale(0.95);
        }

        .ptt-btn.transmitting {
            border-color: #ff4444;
            background: radial-gradient(circle at 30% 30%, #ff4444, #cc0000);
            color: white;
            animation: glow-red 0.8s infinite;
        }

        @keyframes glow-red {
            0% { box-shadow: 0 0 20px rgba(255,68,68,0.2); }
            50% { box-shadow: 0 0 60px rgba(255,68,68,0.6); }
            100% { box-shadow: 0 0 20px rgba(255,68,68,0.2); }
        }

        .ptt-btn.transmitting .icon {
            animation: mic-wave 0.5s infinite;
        }

        @keyframes mic-wave {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ВОЛНЫ ВОКРУГ */
        .ptt-btn .ring {
            display: none;
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid rgba(255,68,68,0.15);
            animation: ring-wave 1.2s infinite;
        }

        .ptt-btn.transmitting .ring {
            display: block;
        }

        .ptt-btn .ring:nth-child(2) { animation-delay: 0.4s; }
        .ptt-btn .ring:nth-child(3) { animation-delay: 0.8s; }

        @keyframes ring-wave {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .ptt-container {
            position: relative;
            display: inline-block;
        }

        /* СООБЩЕНИЯ */
        .messages-box {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 10px;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 10px;
            text-align: left;
        }

        .messages-box::-webkit-scrollbar {
            width: 3px;
        }
        .messages-box::-webkit-scrollbar-thumb {
            background: #f5a623;
            border-radius: 4px;
        }

        .msg-item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-item .user {
            color: #f5a623;
            font-weight: bold;
            font-size: 0.75rem;
            min-width: 55px;
        }

        .msg-item .time {
            color: #555;
            font-size: 0.65rem;
        }

        .msg-item .play-btn {
            background: none;
            border: none;
            color: #4CAF50;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 2px 8px;
        }

        .msg-empty {
            text-align: center;
            color: #444;
            padding: 20px;
            font-size: 0.85rem;
        }

        /* ТОСТ */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 100;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            font-weight: 600;
            font-size: 0.85rem;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #ff4444; }

        .footer {
            color: #444;
            font-size: 0.7rem;
            margin-top: 15px;
        }

        @media (max-width: 450px) {
            .ptt-btn {
                width: 160px;
                height: 160px;
            }
            .ptt-btn .icon {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container">
        <div class="logo">
            📻
            <span>WHOPPER РАЦИЯ</span>
        </div>
        <div class="sub">Нажмите и удерживайте для передачи</div>

        <!-- СТАТУС -->
        <div class="status-bar">
            <div>
                <span class="status-dot gray" id="statusDot"></span>
                <span class="status-text" id="statusText">Офлайн</span>
            </div>
            <div class="listeners-count">
                👥 <span id="listenerCount">0</span>
            </div>
        </div>

        <!-- КНОПКА -->
        <div class="ptt-container">
            <button class="ptt-btn" id="pttBtn"
                    onmousedown="startTalk()"
                    onmouseup="stopTalk()"
                    onmouseleave="stopTalk()"
                    ontouchstart="startTalk()"
                    ontouchend="stopTalk()"
                    ontouchcancel="stopTalk()">
                <span class="ring"></span>
                <span class="ring"></span>
                <span class="ring"></span>
                <span class="icon"><i class="fas fa-microphone-alt"></i></span>
                <span class="label" id="btnLabel">НАЖМИТЕ</span>
            </button>
        </div>

        <!-- СООБЩЕНИЯ -->
        <div class="messages-box" id="messagesBox">
            <div class="msg-empty">
                <i class="fas fa-radio" style="display:block; font-size:1.5rem; margin-bottom:6px; color:#333;"></i>
                Нет сообщений
            </div>
        </div>

        <div class="footer">
            <i class="fas fa-circle" style="color:#f5a623; font-size:0.5rem;"></i>
            Канал 1
        </div>
    </div>

    <script>
        // ===== FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
            authDomain: "bk-cashier.firebaseapp.com",
            databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bk-cashier",
            storageBucket: "bk-cashier.firebasestorage.app",
            messagingSenderId: "385000840969",
            appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // ===== ПЕРЕМЕННЫЕ =====
        const userId = 'user_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 4);
        let isTalking = false;
        let mediaRecorder = null;
        let stream = null;
        let audioChunks = [];
        let isMicReady = false;

        // ===== ТОСТ =====
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
        }

        // ===== СТАТУС =====
        function setStatus(state, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            dot.className = 'status-dot ' + state;
            statusText.textContent = text;
        }

        // ===== ЗАПРОС МИКРОФОНА =====
        async function getMicrophone() {
            try {
                showToast('🎤 Запрос микрофона...', 'info');
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                isMicReady = true;
                showToast('✅ Микрофон готов', 'success');
                return true;
            } catch (err) {
                console.error(err);
                showToast('❌ Нет доступа к микрофону', 'error');
                return false;
            }
        }

        // ===== НАЧАТЬ ГОВОРИТЬ =====
        window.startTalk = async function() {
            if (isTalking) return;

            if (!isMicReady) {
                const ok = await getMicrophone();
                if (!ok) return;
            }

            isTalking = true;

            // Обновляем кнопку
            const btn = document.getElementById('pttBtn');
            btn.className = 'ptt-btn transmitting';
            document.getElementById('btnLabel').textContent = 'ГОВОРИТЕ';
            setStatus('red', 'Передача...');

            // Запускаем запись
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                // Сохраняем запись
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                saveMessage(blob);
            };

            mediaRecorder.start();

            if (navigator.vibrate) navigator.vibrate(30);
            showToast('🔴 Говорите...', 'info');
        };

        // ===== ОСТАНОВИТЬ ГОВОРИТЬ =====
        window.stopTalk = function() {
            if (!isTalking) return;

            isTalking = false;

            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }

            // Обновляем кнопку
            const btn = document.getElementById('pttBtn');
            btn.className = 'ptt-btn';
            document.getElementById('btnLabel').textContent = 'НАЖМИТЕ';
            setStatus('green', 'Онлайн');

            if (navigator.vibrate) navigator.vibrate(20);
            showToast('⏹️ Готово', 'info');
        };

        // ===== СОХРАНИТЬ СООБЩЕНИЕ =====
        async function saveMessage(blob) {
            const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);

            try {
                // Загружаем в Storage
                const ref = storage.ref('radio/' + msgId + '.webm');
                await ref.put(blob, { contentType: 'audio/webm' });

                // Сохраняем в базу
                await db.ref('radio/messages/' + msgId).set({
                    id: msgId,
                    userId: userId,
                    userName: 'Пользователь',
                    timestamp: Date.now(),
                    duration: 0
                });

                showToast('✅ Сообщение отправлено', 'success');

            } catch (err) {
                console.error('Ошибка:', err);
                showToast('❌ Ошибка отправки', 'error');
            }
        }

        // ===== ЗАГРУЗКА СООБЩЕНИЙ =====
        function loadMessages() {
            db.ref('radio/messages').orderByChild('timestamp').limitToLast(15).on('value', (sn) => {
                const items = [];
                sn.forEach(child => items.push({ id: child.key, ...child.val() }));
                renderMessages(items.reverse());
            });
        }

        function renderMessages(items) {
            const box = document.getElementById('messagesBox');

            if (items.length === 0) {
                box.innerHTML = `
                    <div class="msg-empty">
                        <i class="fas fa-radio" style="display:block; font-size:1.5rem; margin-bottom:6px; color:#333;"></i>
                        Нет сообщений
                    </div>
                `;
                return;
            }

            box.innerHTML = items.map(msg => `
                <div class="msg-item">
                    <span class="user"><i class="fas fa-user"></i> ${msg.userName || 'Кто-то'}</span>
                    <span class="time">${formatTime(msg.timestamp)}</span>
                    <button class="play-btn" onclick="playMessage('${msg.id}')">
                        <i class="fas fa-play"></i>
                    </button>
                </div>
            `).join('');
        }

        function formatTime(ts) {
            if (!ts) return '--:--';
            const d = new Date(ts);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        // ===== ВОСПРОИЗВЕДЕНИЕ =====
        window.playMessage = async function(msgId) {
            try {
                const url = await storage.ref('radio/' + msgId + '.webm').getDownloadURL();
                const audio = new Audio(url);
                audio.play();
                showToast('▶️ Воспроизведение', 'info');
            } catch (err) {
                showToast('❌ Не удалось воспроизвести', 'error');
            }
        };

        // ===== СЧЁТЧИК СЛУШАТЕЛЕЙ =====
        function updateListeners() {
            const ref = db.ref('radio/listeners/' + userId);
            ref.set({ online: true, lastSeen: Date.now() });
            ref.onDisconnect().remove();

            db.ref('radio/listeners').on('value', (sn) => {
                document.getElementById('listenerCount').textContent = sn.numChildren();
            });
        }

        // ===== ПРИ ЗАКРЫТИИ =====
        window.addEventListener('beforeunload', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            db.ref('radio/listeners/' + userId).remove();
        });

        // ===== ЗАПУСК =====
        setStatus('green', 'Онлайн');
        updateListeners();
        loadMessages();

        console.log('📻 РАЦИЯ ЗАПУЩЕНА');
        console.log('🆔', userId);
        console.log('🔴 Нажмите и удерживайте кнопку для передачи');
    </script>
</body>
</html>
