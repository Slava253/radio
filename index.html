<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎙️ WHOPPER RADIO • LIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2rem;
            color: #f5a623;
            margin-bottom: 5px;
        }

        .sub {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* СТАТУС */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            transition: 0.3s;
        }

        .dot.offline {
            background: #444;
        }
        .dot.online {
            background: #4CAF50;
            animation: pulse 1.5s infinite;
        }
        .dot.recording {
            background: #ff4444;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 0.95rem;
            color: #aaa;
        }

        .status-text strong {
            color: #f5a623;
        }

        /* КНОПКА */
        .btn-main {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            margin: 10px auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .btn-main .label {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-main.idle {
            background: linear-gradient(145deg, #2d2d44, #1a1a2e);
            color: #888;
            border: 3px solid #444;
        }

        .btn-main.idle:hover {
            border-color: #f5a623;
            color: #f5a623;
        }

        .btn-main.idle:active {
            transform: scale(0.95);
        }

        .btn-main.recording {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: white;
            border: 3px solid #ff6666;
            animation: glow-red 1s infinite;
        }

        @keyframes glow-red {
            0% { box-shadow: 0 0 20px rgba(255,68,68,0.3); }
            50% { box-shadow: 0 0 60px rgba(255,68,68,0.7); }
            100% { box-shadow: 0 0 20px rgba(255,68,68,0.3); }
        }

        .btn-main.recording:active {
            transform: scale(0.95);
        }

        .btn-main .waves {
            display: none;
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid rgba(255,68,68,0.3);
            animation: wave 1.5s infinite;
        }

        .btn-main.recording .waves {
            display: block;
        }

        .btn-main .waves:nth-child(2) {
            animation-delay: 0.5s;
        }
        .btn-main .waves:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes wave {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* СЧЁТЧИК СЛУШАТЕЛЕЙ */
        .listeners {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .listeners span {
            color: #f5a623;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* ПЛЕЕР ДЛЯ ПРОСЛУШИВАНИЯ */
        .player {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px 20px;
            margin-top: 20px;
            display: none;
            align-items: center;
            gap: 15px;
        }

        .player.active {
            display: flex;
        }

        .player .play-btn {
            background: #f5a623;
            border: none;
            color: #1a1a2e;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .player .play-btn:active {
            transform: scale(0.95);
        }

        .player .info {
            flex: 1;
            text-align: left;
            min-width: 0;
        }

        .player .info .name {
            font-weight: bold;
            color: #f5a623;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player .info .time {
            color: #888;
            font-size: 0.75rem;
        }

        .player .progress {
            width: 100%;
            height: 3px;
            background: #333;
            border-radius: 3px;
            margin-top: 5px;
            cursor: pointer;
            position: relative;
        }

        .player .progress .bar {
            height: 100%;
            background: #f5a623;
            border-radius: 3px;
            width: 0%;
            transition: 0.1s;
        }

        .player .close {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* ТОСТ */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            z-index: 100;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            font-weight: 600;
            font-size: 0.9rem;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #ff4444; }
        .toast.info { background: #2196F3; }

        /* ИСТОРИЯ СООБЩЕНИЙ */
        .history {
            margin-top: 25px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }

        .history::-webkit-scrollbar {
            width: 4px;
        }

        .history::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        .history::-webkit-scrollbar-thumb {
            background: #f5a623;
            border-radius: 4px;
        }

        .history-item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-item .h-user {
            color: #f5a623;
            font-weight: bold;
            font-size: 0.8rem;
            min-width: 70px;
        }

        .history-item .h-time {
            color: #666;
            font-size: 0.7rem;
            min-width: 40px;
        }

        .history-item .h-play {
            background: none;
            border: none;
            color: #4CAF50;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: auto;
        }

        .history-item .h-play:active {
            transform: scale(0.9);
        }

        .history-item .h-duration {
            color: #666;
            font-size: 0.7rem;
        }

        .empty-history {
            text-align: center;
            color: #444;
            padding: 20px;
            font-size: 0.9rem;
        }

        /* АДАПТИВ */
        @media (max-width: 500px) {
            .btn-main {
                width: 160px;
                height: 160px;
                font-size: 2.2rem;
            }
            .btn-main .label {
                font-size: 0.7rem;
            }
            h1 { font-size: 1.6rem; }
            .history-item { padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container">
        <div class="logo">🎙️</div>
        <h1>WHOPPER RADIO</h1>
        <div class="sub">Живой эфир • Говорите — все услышат</div>

        <!-- СТАТУС -->
        <div class="status">
            <span class="dot offline" id="statusDot"></span>
            <span class="status-text" id="statusText">
                <strong>🔴</strong> Микрофон выключен
            </span>
        </div>

        <!-- КНОПКА -->
        <button class="btn-main idle" id="mainBtn" onclick="toggleRecording()">
            <span class="waves"></span>
            <span class="waves"></span>
            <span class="waves"></span>
            <i class="fas fa-microphone"></i>
            <span class="label" id="btnLabel">ГОВОРИТЬ</span>
        </button>

        <!-- СЛУШАТЕЛИ -->
        <div class="listeners">
            👥 <span id="listenerCount">0</span> слушателей онлайн
        </div>

        <!-- ПЛЕЕР -->
        <div class="player" id="player">
            <button class="play-btn" id="playerPlayBtn" onclick="togglePlayerPlay()">
                <i class="fas fa-play"></i>
            </button>
            <div class="info">
                <div class="name" id="playerName">Сообщение</div>
                <div class="time" id="playerTime">0:00 / 0:00</div>
                <div class="progress" onclick="seekPlayer(event)">
                    <div class="bar" id="playerProgress"></div>
                </div>
            </div>
            <button class="close" onclick="closePlayer()"><i class="fas fa-times"></i></button>
        </div>

        <!-- ИСТОРИЯ -->
        <div class="history" id="historyList">
            <div class="empty-history">
                <i class="fas fa-radio" style="font-size:1.5rem; display:block; margin-bottom:8px;"></i>
                Нет сообщений в эфире
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
            authDomain: "bk-cashier.firebaseapp.com",
            databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bk-cashier",
            storageBucket: "bk-cashier.firebasestorage.app",
            messagingSenderId: "385000840969",
            appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // === ПЕРЕМЕННЫЕ ===
        let userId = 'user_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 4);
        let isRecording = false;
        let mediaRecorder = null;
        let stream = null;
        let audioChunks = [];
        let isPlaying = false;
        let currentAudio = null;
        let currentMsgId = null;
        let audioContext = null;
        let isMicRequested = false;

        // ДЛЯ ЖИВОЙ ПЕРЕДАЧИ
        let liveInterval = null;
        let lastChunkTime = 0;

        // === ПОКАЗАТЬ ТОСТ ===
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // === ОБНОВЛЕНИЕ СТАТУСА ===
        function setStatus(state, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            dot.className = 'dot ' + state;
            statusText.innerHTML = text;
        }

        // === СЧЁТЧИК СЛУШАТЕЛЕЙ ===
        function updateListeners() {
            const ref = db.ref('radio/listeners/' + userId);
            ref.set({ online: true, lastSeen: Date.now() });
            ref.onDisconnect().remove();

            db.ref('radio/listeners').on('value', (sn) => {
                document.getElementById('listenerCount').textContent = sn.numChildren();
            });
        }

        // === ЗАГРУЗКА ИСТОРИИ ===
        function loadHistory() {
            db.ref('radio/messages').orderByChild('timestamp').limitToLast(50).on('value', (sn) => {
                const items = [];
                sn.forEach(child => items.push({ id: child.key, ...child.val() }));
                renderHistory(items.reverse());
            });
        }

        function renderHistory(items) {
            const container = document.getElementById('historyList');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-history">
                        <i class="fas fa-radio" style="font-size:1.5rem; display:block; margin-bottom:8px;"></i>
                        Нет сообщений в эфире
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(msg => `
                <div class="history-item" data-id="${msg.id}">
                    <span class="h-user"><i class="fas fa-user"></i> ${msg.userName || 'Кто-то'}</span>
                    <span class="h-time">${formatTime(msg.timestamp)}</span>
                    <span class="h-duration">${msg.duration ? formatDuration(msg.duration) : '0:00'}</span>
                    <button class="h-play" onclick="playMessage('${msg.id}')">
                        <i class="fas fa-play"></i>
                    </button>
                </div>
            `).join('');
        }

        function formatTime(ts) {
            if (!ts) return '--:--';
            const d = new Date(ts);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function formatDuration(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // === ЗАПРОС МИКРОФОНА ===
        async function requestMic() {
            if (isMicRequested) return true;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                isMicRequested = true;
                showToast('🎤 Микрофон подключён', 'success');
                return true;
            } catch (err) {
                showToast('❌ Нет доступа к микрофону!', 'error');
                console.error(err);
                return false;
            }
        }

        // === ТОГГЛ ЗАПИСИ ===
        window.toggleRecording = async () => {
            if (isRecording) {
                stopRecording();
                return;
            }

            // Запрашиваем микрофон если ещё не просили
            if (!isMicRequested) {
                const ok = await requestMic();
                if (!ok) return;
            }

            startRecording();
        };

        // === НАЧАТЬ ЗАПИСЬ (МГНОВЕННАЯ ПЕРЕДАЧА) ===
        async function startRecording() {
            try {
                if (!stream) {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    isMicRequested = true;
                }

                // Создаём MediaRecorder с маленьким интервалом для быстрой передачи
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'audio/webm;codecs=opus',
                    audioBitsPerSecond: 64000
                });

                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                        // ОТПРАВЛЯЕМ КАЖДЫЙ ЧАНК МГНОВЕННО
                        sendLiveChunk(event.data);
                    }
                };

                // Отправляем данные каждые 500мс для минимальной задержки
                mediaRecorder.start(500);

                isRecording = true;

                // Обновляем UI
                const btn = document.getElementById('mainBtn');
                btn.className = 'btn-main recording';
                document.getElementById('btnLabel').textContent = 'СТОП';
                setStatus('recording', '<strong>🔴 LIVE</strong> Идёт трансляция...');

                showToast('🔴 Эфир начался!', 'info');

                // Создаём запись в базе как LIVE
                const liveRef = db.ref('radio/live');
                liveRef.set({
                    active: true,
                    startedAt: Date.now(),
                    userId: userId,
                    userName: 'Ведущий'
                });
                liveRef.onDisconnect().remove();

            } catch (err) {
                console.error('Ошибка записи:', err);
                showToast('❌ Ошибка запуска', 'error');
            }
        }

        // === ОТПРАВКА ЖИВОГО ЧАНКА ===
        function sendLiveChunk(audioData) {
            const chunkId = 'chunk_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);

            // Конвертим в base64 для быстрой передачи
            const reader = new FileReader();
            reader.onload = () => {
                const base64 = reader.result.split(',')[1];
                db.ref('radio/live/chunks/' + chunkId).set({
                    data: base64,
                    timestamp: Date.now(),
                    userId: userId
                });
                // Удаляем старые чанки (держим только последние 10)
                db.ref('radio/live/chunks').once('value', (sn) => {
                    const keys = [];
                    sn.forEach(c => keys.push(c.key));
                    if (keys.length > 10) {
                        const toRemove = keys.slice(0, keys.length - 10);
                        toRemove.forEach(k => db.ref('radio/live/chunks/' + k).remove());
                    }
                });
            };
            reader.readAsDataURL(audioData);
        }

        // === ОСТАНОВИТЬ ЗАПИСЬ ===
        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;

            mediaRecorder.stop();
            isRecording = false;

            // Отключаем live
            db.ref('radio/live').remove();

            // Обновляем UI
            const btn = document.getElementById('mainBtn');
            btn.className = 'btn-main idle';
            document.getElementById('btnLabel').textContent = 'ГОВОРИТЬ';
            setStatus('offline', '<strong>🔴</strong> Микрофон выключен');

            // Сохраняем финальную запись в историю
            if (audioChunks.length > 0) {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                saveFinalRecording(blob);
            }

            audioChunks = [];
            showToast('⏹️ Эфир завершён', 'info');

            // Освобождаем стрим
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                isMicRequested = false;
            }
        }

        // === СОХРАНЕНИЕ ФИНАЛЬНОЙ ЗАПИСИ ===
        async function saveFinalRecording(blob) {
            const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            const duration = await getAudioDuration(blob);

            // Загружаем в Storage
            try {
                const ref = storage.ref('radio/audio/' + msgId + '.webm');
                await ref.put(blob, { contentType: 'audio/webm' });

                // Сохраняем в базу
                await db.ref('radio/messages/' + msgId).set({
                    id: msgId,
                    userName: 'Ведущий',
                    timestamp: Date.now(),
                    duration: duration,
                    isLive: false
                });

                showToast('✅ Запись сохранена', 'success');
            } catch (err) {
                console.error('Ошибка сохранения:', err);
            }
        }

        // === ДЛИТЕЛЬНОСТЬ АУДИО ===
        function getAudioDuration(blob) {
            return new Promise((resolve) => {
                const audio = new Audio();
                const url = URL.createObjectURL(blob);
                audio.src = url;
                audio.onloadedmetadata = () => {
                    resolve(audio.duration);
                    URL.revokeObjectURL(url);
                };
                audio.onerror = () => resolve(0);
            });
        }

        // === ПРОСЛУШИВАНИЕ ЖИВОГО ЭФИРА ===
        function listenLive() {
            let lastChunkTime = 0;
            let audioBuffer = [];
            let isPlayingLive = false;
            let liveAudio = null;

            db.ref('radio/live/chunks').on('child_added', (sn) => {
                const chunk = sn.val();
                const now = Date.now();

                // Пропускаем свои же чанки
                if (chunk.userId === userId) return;

                // Декодируем base64
                try {
                    const binary = atob(chunk.data);
                    const array = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) {
                        array[i] = binary.charCodeAt(i);
                    }
                    const blob = new Blob([array], { type: 'audio/webm' });
                    const url = URL.createObjectURL(blob);

                    // Воспроизводим мгновенно
                    if (liveAudio) {
                        liveAudio.pause();
                        liveAudio = null;
                    }

                    liveAudio = new Audio(url);
                    liveAudio.volume = 0.8;
                    liveAudio.play().catch(() => {});

                    // Показываем, что идёт прослушивание
                    const player = document.getElementById('player');
                    if (!player.classList.contains('active')) {
                        player.classList.add('active');
                        document.getElementById('playerName').textContent = '🎙️ LIVE ЭФИР';
                        document.getElementById('playerPlayBtn').innerHTML = '<i class="fas fa-pause"></i>';
                        document.getElementById('playerPlayBtn').onclick = () => {
                            if (liveAudio) {
                                if (liveAudio.paused) {
                                    liveAudio.play();
                                    document.getElementById('playerPlayBtn').innerHTML = '<i class="fas fa-pause"></i>';
                                } else {
                                    liveAudio.pause();
                                    document.getElementById('playerPlayBtn').innerHTML = '<i class="fas fa-play"></i>';
                                }
                            }
                        };
                    }

                    // Очищаем старые URL
                    setTimeout(() => URL.revokeObjectURL(url), 5000);

                } catch (e) {
                    console.log('Ошибка декодирования чанка');
                }
            });

            // Следим за статусом LIVE
            db.ref('radio/live').on('value', (sn) => {
                const live = sn.val();
                if (!live || !live.active) {
                    // LIVE закончился
                    if (liveAudio) {
                        liveAudio.pause();
                        liveAudio = null;
                    }
                    const player = document.getElementById('player');
                    if (player.classList.contains('active')) {
                        // Не закрываем, если есть сохранённые сообщения
                        const name = document.getElementById('playerName');
                        if (name.textContent === '🎙️ LIVE ЭФИР') {
                            player.classList.remove('active');
                        }
                    }
                }
            });
        }

        // === ВОСПРОИЗВЕДЕНИЕ СОХРАНЁННОГО ===
        window.playMessage = async (msgId) => {
            try {
                if (isPlaying && currentMsgId === msgId) {
                    togglePlayerPlay();
                    return;
                }

                if (isPlaying) {
                    stopAudio();
                }

                const url = await storage.ref('radio/audio/' + msgId + '.webm').getDownloadURL();
                const sn = await db.ref('radio/messages/' + msgId).once('value');
                const data = sn.val();

                currentMsgId = msgId;
                currentAudio = new Audio(url);

                currentAudio.onloadedmetadata = () => {
                    document.getElementById('playerName').textContent = '📻 Сообщение';
                    document.getElementById('playerTime').textContent = '0:00 / ' + formatDuration(currentAudio.duration);
                };

                currentAudio.ontimeupdate = () => {
                    const prog = (currentAudio.currentTime / currentAudio.duration) * 100;
                    document.getElementById('playerProgress').style.width = prog + '%';
                    document.getElementById('playerTime').textContent =
                        formatDuration(currentAudio.currentTime) + ' / ' + formatDuration(currentAudio.duration);
                };

                currentAudio.onended = () => {
                    stopAudio();
                    closePlayer();
                };

                document.getElementById('player').classList.add('active');
                document.getElementById('playerPlayBtn').innerHTML = '<i class="fas fa-pause"></i>';

                currentAudio.play();
                isPlaying = true;

            } catch (err) {
                showToast('❌ Не удалось воспроизвести', 'error');
            }
        };

        // === УПРАВЛЕНИЕ ПЛЕЕРОМ ===
        window.togglePlayerPlay = () => {
            if (!currentAudio) return;
            if (isPlaying) {
                currentAudio.pause();
                isPlaying = false;
                document.getElementById('playerPlayBtn').innerHTML = '<i class="fas fa-play"></i>';
            } else {
                currentAudio.play();
                isPlaying = true;
                document.getElementById('playerPlayBtn').innerHTML = '<i class="fas fa-pause"></i>';
            }
        };

        window.seekPlayer = (e) => {
            if (!currentAudio) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            currentAudio.currentTime = x * currentAudio.duration;
        };

        window.closePlayer = () => {
            stopAudio();
            document.getElementById('player').classList.remove('active');
        };

        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                isPlaying = false;
                currentAudio = null;
                currentMsgId = null;
            }
            document.getElementById('playerPlayBtn').innerHTML = '<i class="fas fa-play"></i>';
        }

        // === ПРИ ОБНОВЛЕНИИ СТРАНИЦЫ ===
        window.addEventListener('beforeunload', () => {
            if (isRecording && mediaRecorder) {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            db.ref('radio/listeners/' + userId).remove();
            db.ref('radio/live').remove();
        });

        // === ИНИЦИАЛИЗАЦИЯ ===
        updateListeners();
        loadHistory();
        listenLive();

        // Обработка ошибок микрофона при первом клике
        document.getElementById('mainBtn').addEventListener('click', async (e) => {
            if (!isMicRequested) {
                // Просто просим разрешение при первом клике
                await requestMic();
            }
        });

        console.log('🎙️ WHOPPER RADIO LIVE');
        console.log('🆔 ID:', userId);
        console.log('📢 Нажмите ГОВОРИТЬ чтобы начать трансляцию');
    </script>
</body>
</html>
