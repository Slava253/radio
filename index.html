<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎙️ WHOPPER RADIO • МГНОВЕННЫЙ ЭФИР</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2rem;
            color: #f5a623;
            margin-bottom: 5px;
        }

        .sub {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .dot.offline {
            background: #444;
        }
        .dot.online {
            background: #4CAF50;
            animation: pulse 1.5s infinite;
        }
        .dot.recording {
            background: #ff4444;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 0.95rem;
            color: #aaa;
        }

        .status-text strong {
            color: #f5a623;
        }

        .btn-main {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            margin: 10px auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .btn-main .label {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-main.idle {
            background: linear-gradient(145deg, #2d2d44, #1a1a2e);
            color: #888;
            border: 3px solid #444;
        }

        .btn-main.idle:hover {
            border-color: #f5a623;
            color: #f5a623;
        }

        .btn-main.idle:active {
            transform: scale(0.95);
        }

        .btn-main.recording {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: white;
            border: 3px solid #ff6666;
            animation: glow-red 1s infinite;
        }

        @keyframes glow-red {
            0% { box-shadow: 0 0 20px rgba(255,68,68,0.3); }
            50% { box-shadow: 0 0 60px rgba(255,68,68,0.7); }
            100% { box-shadow: 0 0 20px rgba(255,68,68,0.3); }
        }

        .btn-main.recording:active {
            transform: scale(0.95);
        }

        .btn-main .waves {
            display: none;
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid rgba(255,68,68,0.3);
            animation: wave 1.5s infinite;
        }

        .btn-main.recording .waves {
            display: block;
        }

        .btn-main .waves:nth-child(2) {
            animation-delay: 0.5s;
        }
        .btn-main .waves:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes wave {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .listeners {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .listeners span {
            color: #f5a623;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            z-index: 100;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            font-weight: 600;
            font-size: 0.9rem;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #ff4444; }
        .toast.info { background: #2196F3; }

        .history {
            margin-top: 25px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }

        .history::-webkit-scrollbar {
            width: 4px;
        }

        .history::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        .history::-webkit-scrollbar-thumb {
            background: #f5a623;
            border-radius: 4px;
        }

        .history-item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-item .h-user {
            color: #f5a623;
            font-weight: bold;
            font-size: 0.8rem;
            min-width: 60px;
        }

        .history-item .h-time {
            color: #666;
            font-size: 0.7rem;
            min-width: 40px;
        }

        .history-item .h-duration {
            color: #666;
            font-size: 0.7rem;
            min-width: 35px;
        }

        .history-item .h-play {
            background: none;
            border: none;
            color: #4CAF50;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: auto;
            padding: 5px 10px;
        }

        .history-item .h-play:active {
            transform: scale(0.9);
        }

        .empty-history {
            text-align: center;
            color: #444;
            padding: 20px;
            font-size: 0.9rem;
        }

        /* Индикатор активности LIVE */
        .live-indicator {
            display: none;
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            border-radius: 60px;
            padding: 5px 15px;
            font-size: 0.7rem;
            color: #ff4444;
            margin: 10px auto;
        }

        .live-indicator.active {
            display: inline-block;
            animation: pulse-text 1s infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 500px) {
            .btn-main {
                width: 160px;
                height: 160px;
                font-size: 2.2rem;
            }
            .btn-main .label {
                font-size: 0.7rem;
            }
            h1 { font-size: 1.6rem; }
            .history-item { padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container">
        <div class="logo">🎙️</div>
        <h1>WHOPPER RADIO</h1>
        <div class="sub">Мгновенный эфир • Говорите — все слышат сразу</div>

        <div class="status">
            <span class="dot offline" id="statusDot"></span>
            <span class="status-text" id="statusText">
                <strong>🔴</strong> Микрофон выключен
            </span>
        </div>

        <button class="btn-main idle" id="mainBtn" onclick="toggleRecording()">
            <span class="waves"></span>
            <span class="waves"></span>
            <span class="waves"></span>
            <i class="fas fa-microphone"></i>
            <span class="label" id="btnLabel">ГОВОРИТЬ</span>
        </button>

        <div class="listeners">
            👥 <span id="listenerCount">0</span> слушателей онлайн
        </div>

        <div class="history" id="historyList">
            <div class="empty-history">
                <i class="fas fa-radio" style="font-size:1.5rem; display:block; margin-bottom:8px;"></i>
                Нет сообщений в эфире
            </div>
        </div>
    </div>

    <script>
        // ========== FIREBASE КОНФИГ ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
            authDomain: "bk-cashier.firebaseapp.com",
            databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bk-cashier",
            storageBucket: "bk-cashier.firebasestorage.app",
            messagingSenderId: "385000840969",
            appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== ПЕРЕМЕННЫЕ ==========
        const userId = 'user_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 4);

        let isRecording = false;
        let isMicReady = false;
        let stream = null;
        let peerConnection = null;
        let audioSender = null;

        let liveListenerRef = null;
        let isReceiving = false;

        // ========== ПОКАЗАТЬ ТОСТ ==========
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ========== ОБНОВЛЕНИЕ СТАТУСА ==========
        function setStatus(state, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            dot.className = 'dot ' + state;
            statusText.innerHTML = text;
        }

        // ========== ЗАПРОС МИКРОФОНА ==========
        async function requestMicrophone() {
            try {
                showToast('🎤 Запрос доступа к микрофону...', 'info');

                stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 48000
                    }
                });

                isMicReady = true;
                showToast('✅ Микрофон подключён!', 'success');
                return true;

            } catch (err) {
                console.error('Ошибка доступа к микрофону:', err);

                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    showToast('❌ Разрешение на микрофон отклонено. Разрешите доступ в браузере.', 'error');
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    showToast('❌ Микрофон не найден. Подключите микрофон.', 'error');
                } else {
                    showToast('❌ Ошибка: ' + err.message, 'error');
                }

                return false;
            }
        }

        // ========== ТОГГЛ ЗАПИСИ ==========
        window.toggleRecording = async () => {
            if (isRecording) {
                stopRecording();
                return;
            }

            if (!isMicReady) {
                const ok = await requestMicrophone();
                if (!ok) return;
            }

            startRecording();
        };

        // ========== НАЧАТЬ ЗАПИСЬ (WebRTC) ==========
        function startRecording() {
            try {
                if (!stream) {
                    showToast('❌ Микрофон не готов', 'error');
                    return;
                }

                // Создаём WebRTC соединение
                const configuration = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                };

                peerConnection = new RTCPeerConnection(configuration);

                // Добавляем аудио-трек
                const audioTrack = stream.getAudioTracks()[0];
                if (audioTrack) {
                    audioSender = peerConnection.addTrack(audioTrack, stream);
                }

                // Обработка ICE-кандидатов
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        db.ref('radio/webrtc/signaling/' + userId + '/candidate').set({
                            candidate: event.candidate,
                            timestamp: Date.now()
                        });
                    }
                };

                // Создаём offer
                peerConnection.createOffer()
                    .then(offer => {
                        return peerConnection.setLocalDescription(offer);
                    })
                    .then(() => {
                        // Отправляем offer в Firebase
                        db.ref('radio/webrtc/signaling/' + userId).set({
                            type: 'offer',
                            sdp: peerConnection.localDescription,
                            timestamp: Date.now(),
                            active: true
                        });
                        db.ref('radio/webrtc/signaling/' + userId).onDisconnect().remove();
                    })
                    .catch(err => {
                        console.error('Ошибка создания offer:', err);
                        showToast('❌ Ошибка запуска эфира', 'error');
                    });

                // Слушаем ответы от слушателей
                db.ref('radio/webrtc/signaling/' + userId + '/answer').on('value', (sn) => {
                    const data = sn.val();
                    if (data && data.sdp && peerConnection) {
                        const answer = new RTCSessionDescription(data.sdp);
                        peerConnection.setRemoteDescription(answer)
                            .then(() => {
                                console.log('✅ Соединение установлено со слушателем');
                            })
                            .catch(err => console.error('Ошибка установки ответа:', err));
                    }
                });

                // Слушаем кандидаты от слушателей
                db.ref('radio/webrtc/signaling/' + userId + '/candidate').on('child_added', (sn) => {
                    const data = sn.val();
                    if (data && data.candidate && peerConnection) {
                        peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate))
                            .catch(err => console.error('Ошибка добавления кандидата:', err));
                    }
                });

                isRecording = true;

                // Обновляем UI
                const btn = document.getElementById('mainBtn');
                btn.className = 'btn-main recording';
                document.getElementById('btnLabel').textContent = 'СТОП';
                setStatus('recording', '<strong>🔴 LIVE</strong> Идёт трансляция...');

                // Отмечаем в Firebase что идёт LIVE
                db.ref('radio/live').set({
                    active: true,
                    startedAt: Date.now(),
                    userId: userId,
                    userName: 'Ведущий',
                    type: 'webrtc'
                });
                db.ref('radio/live').onDisconnect().remove();

                showToast('🔴 Эфир начался!', 'info');

            } catch (err) {
                console.error('Ошибка записи:', err);
                showToast('❌ Ошибка запуска: ' + err.message, 'error');
            }
        }

        // ========== ОСТАНОВИТЬ ЗАПИСЬ ==========
        function stopRecording() {
            if (!isRecording) return;

            isRecording = false;

            // Закрываем WebRTC
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
                audioSender = null;
            }

            // Очищаем сигналинг
            db.ref('radio/webrtc/signaling/' + userId).remove();
            db.ref('radio/live').remove();

            // Обновляем UI
            const btn = document.getElementById('mainBtn');
            btn.className = 'btn-main idle';
            document.getElementById('btnLabel').textContent = 'ГОВОРИТЬ';
            setStatus('offline', '<strong>🔴</strong> Микрофон выключен');

            showToast('⏹️ Эфир завершён', 'info');
        }

        // ========== ПРИЁМ ЭФИРА (WebRTC) ==========
        function startReceiving(broadcasterId) {
            if (isReceiving) return;

            try {
                const configuration = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                };

                const pc = new RTCPeerConnection(configuration);

                // Обработка ICE-кандидатов
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        db.ref('radio/webrtc/signaling/' + broadcasterId + '/candidate').set({
                            candidate: event.candidate,
                            timestamp: Date.now()
                        });
                    }
                };

                // Когда приходит аудио-трек
                pc.ontrack = (event) => {
                    if (event.track.kind === 'audio') {
                        const audio = new Audio();
                        audio.srcObject = new MediaStream([event.track]);
                        audio.play().catch(() => {});
                        isReceiving = true;
                        showToast('🎧 Подключено к эфиру!', 'success');
                    }
                };

                // Получаем offer от ведущего
                db.ref('radio/webrtc/signaling/' + broadcasterId).on('value', (sn) => {
                    const data = sn.val();
                    if (data && data.type === 'offer' && data.sdp) {
                        const offer = new RTCSessionDescription(data.sdp);
                        pc.setRemoteDescription(offer)
                            .then(() => {
                                return pc.createAnswer();
                            })
                            .then(answer => {
                                return pc.setLocalDescription(answer);
                            })
                            .then(() => {
                                // Отправляем ответ
                                db.ref('radio/webrtc/signaling/' + broadcasterId + '/answer').set({
                                    sdp: pc.localDescription,
                                    timestamp: Date.now()
                                });
                            })
                            .catch(err => console.error('Ошибка ответа:', err));
                    }
                });

                // Получаем кандидаты
                db.ref('radio/webrtc/signaling/' + broadcasterId + '/candidate').on('child_added', (sn) => {
                    const data = sn.val();
                    if (data && data.candidate) {
                        pc.addIceCandidate(new RTCIceCandidate(data.candidate))
                            .catch(err => console.error('Ошибка кандидата:', err));
                    }
                });

                // Сохраняем для очистки
                window._receiverPC = pc;
                window._receiverBroadcaster = broadcasterId;

            } catch (err) {
                console.error('Ошибка подключения к эфиру:', err);
            }
        }

        // ========== СЧЁТЧИК СЛУШАТЕЛЕЙ ==========
        function updateListeners() {
            if (liveListenerRef) {
                liveListenerRef.remove();
            }

            const ref = db.ref('radio/listeners/' + userId);
            ref.set({
                online: true,
                lastSeen: Date.now(),
                isBroadcaster: false
            });
            ref.onDisconnect().remove();
            liveListenerRef = ref;

            db.ref('radio/listeners').on('value', (sn) => {
                const count = sn.numChildren();
                document.getElementById('listenerCount').textContent = count;
            });
        }

        // ========== СЛЕЖЕНИЕ ЗА LIVE ЭФИРОМ ==========
        function watchLive() {
            db.ref('radio/live').on('value', (sn) => {
                const live = sn.val();

                if (live && live.active && live.type === 'webrtc') {
                    // Если эфир идёт и это WebRTC
                    if (live.userId !== userId) {
                        // Подключаемся к эфиру ведущего
                        startReceiving(live.userId);
                    }
                } else {
                    // Эфир закончился
                    if (window._receiverPC) {
                        window._receiverPC.close();
                        window._receiverPC = null;
                        isReceiving = false;
                    }
                    // Очищаем сигналинг
                    if (window._receiverBroadcaster) {
                        db.ref('radio/webrtc/signaling/' + window._receiverBroadcaster + '/answer').remove();
                    }
                }
            });
        }

        // ========== ЗАГРУЗКА ИСТОРИИ ==========
        function loadHistory() {
            db.ref('radio/messages').orderByChild('timestamp').limitToLast(50).on('value', (sn) => {
                const items = [];
                sn.forEach(child => items.push({ id: child.key, ...child.val() }));
                renderHistory(items.reverse());
            });
        }

        function renderHistory(items) {
            const container = document.getElementById('historyList');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-history">
                        <i class="fas fa-radio" style="font-size:1.5rem; display:block; margin-bottom:8px;"></i>
                        Нет сообщений в эфире
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(msg => `
                <div class="history-item" data-id="${msg.id}">
                    <span class="h-user"><i class="fas fa-user"></i> ${msg.userName || 'Кто-то'}</span>
                    <span class="h-time">${formatTime(msg.timestamp)}</span>
                    <span class="h-duration">${msg.duration ? formatDuration(msg.duration) : '0:00'}</span>
                    <button class="h-play" onclick="playMessage('${msg.id}')">
                        <i class="fas fa-play"></i>
                    </button>
                </div>
            `).join('');
        }

        function formatTime(ts) {
            if (!ts) return '--:--';
            const d = new Date(ts);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function formatDuration(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // ========== ВОСПРОИЗВЕДЕНИЕ СОХРАНЁННОГО ==========
        window.playMessage = (msgId) => {
            showToast('📻 Сохранённые записи временно недоступны в WebRTC режиме', 'info');
        };

        // ========== ПРИ ОБНОВЛЕНИИ ==========
        window.addEventListener('beforeunload', () => {
            if (isRecording) {
                stopRecording();
            }
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            if (liveListenerRef) {
                liveListenerRef.remove();
            }
            db.ref('radio/live').remove();
            db.ref('radio/webrtc/signaling/' + userId).remove();

            if (window._receiverPC) {
                window._receiverPC.close();
            }
        });

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        updateListeners();
        loadHistory();
        watchLive();

        console.log('🎙️ WHOPPER RADIO • МГНОВЕННЫЙ ЭФИР (WebRTC)');
        console.log('🆔 ID:', userId);
        console.log('📢 Нажмите ГОВОРИТЬ чтобы начать трансляцию');
        console.log('⚡ Звук передаётся мгновенно через WebRTC');
    </script>
